    <div id = "main" align-content>

    <script>
      var unique_tags = [];
      var tags_selected = [];
      var colors = ['#e6194b', '#3cb44b', '#ddc009', '#4363d8', '#f58231', '#911eb4', '#46c0c0', '#f032e6', '#10c60c', '#fabebe', '#008080', '#e6beff', '#9a6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#ae0075', '#8080e0'];
      fetch('/resitems.json')
        .then(response => response.json())
        .then(data => {
          var element = document.getElementById("main");
          const t = document.createElement("div");
          for(i = 0; i < data.length; i++){
            var it = data[i].tags
            for(j = 0; j < it.length;j++){
              if(unique_tags.includes(it[j]) == false ){
                unique_tags.push(it[j]);
              }
            }
          }

          const td = document.createElement('div');
          var ti = document.createElement('h1');
          ti.textContent = "Experience"
          td.appendChild(ti);
          var dload = document.createElement('button');
          var img = document.createElement('img');
          img.src = 'dl-save-im.png';
          img.width = 50;
          img.height = 55;
          dload.appendChild(img);
          dload.style.backgroundColor = 'transparent';
          dload.setAttribute('class','button button4')
          dload.addEventListener('click', downloadPDF);
          td.appendChild(dload);
          element.appendChild(td);
          function downloadPDF() {
            const fileUrl = 'rkresume.pdf';
            const fileName = 'Kroening, Ronald- Resume.pdf';
          
            fetch(fileUrl).then(response => {
              return response.blob();
            }).then(blob => {
              // Create a new anchor tag and set its download and href attributes
              const anchor = document.createElement('a');
              anchor.download = fileName;
              anchor.href = URL.createObjectURL(blob);
          
              // Simulate a click on the anchor to trigger the download
              anchor.click();
          
              // Remove the anchor from the document
              anchor.remove();
            });
          }

          
          
          
         
        // Start file download.
        
          element.appendChild(dload);
          const eld = document.createElement("hr");
          eld.setAttribute('class','hr.solid');
          element.appendChild(eld);
          for(i = 0; i < data.length; i++){
            var els = data[i].tags;
            const el = document.createElement("div");
            el.setAttribute('class',"entry")
            const el1 = document.createElement("div");
            el1.setAttribute('class',"title")
            const ela1= document.createElement('h5');
            if(data[i].end == " "){
              ela1.textContent = data[i].start
            }else{
              ela1.textContent = data[i].start+" - "+data[i].end
            }
            const ela2= document.createElement('h3');
            ela2.textContent = data[i].company+" - "+data[i].Job
            const el2 = document.createElement("div");
            el2.setAttribute('class',"body")
            const n1 = document.createElement('p');
            n1.textContent = data[i].description;
            const eld = document.createElement("hr");
            eld.setAttribute('class','hr.solid');
            el2.appendChild(n1);
            el2.appendChild(eld);
            el1.appendChild(ela2);
            el1.appendChild(ela1);
            el.appendChild(el1);
            el.appendChild(el2)
            t.appendChild(el);
            element.appendChild(t);
          }
          console.log(unique_tags);
        })
        .catch(error => console.error(error));
    </script>
