<div id="main">
  <body>
    <nav>
      <a title ="hb" class="active" href="./index.html" ><img width="50px" alt="moblog" height="50px"src="rklg5.png"></img></a>
      <ul class="navigation">

      </ul>
    </nav>

  </body>
  <script>
    fetch('/qanda.json')
      .then(response => response.json())
      .then(data => {
        var main = "main"
        if (window.innerWidth <= 768) {
          main = "main-mobile";
        }
        var element = document.getElementById(main);
        for(var i = 0; i < data[0]['questions'].length; i++){
          
          var ques = data[0]['questions'][i];
          var ans = data[0]['answers'][i];
          const q = document.createElement('h2');
          q.textContent = ques;
          const a = document.createElement('p');
          a.textContent = ans;
  
          element.appendChild(q);
          element.appendChild(a);
        }
        console.log(data[0]['questions']);
      })
      .catch(error => console.error(error));
  </script>
</div>
