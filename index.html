  <body>
    <div id = "main">
        <nav>

  <section id="section-1">
    <h1><strong>Ronald Kroening</strong></h1>
    <h2><strong>Student | Full Stack Developer</strong></h2>
    <!-- <img src="animation_mk7.gif" background-color="transparent" width="300px" height="300px"><img> -->
    <div></div>
    <button onclick="scrollToSection2()"><img width="70" height="25px"src="scroll_arrow_m2.png"><img></button>
  </section>
  <section id="section02">

  </section>
  <script>
    fetch('/status.json')
      .then(response => response.json())
      .then(data => {
        var element = document.getElementById("main");
        for(i = 0; i < data.length; i++){
          console.log(data[i]);
          const n = document.createElement('h3');
          n.textContent = data[i].question
          const d = document.createElement('p');
          d.textContent = data[i].response
          try{
            var t1 = data[i].link
            d.href = t1
            d.link = t1
          }catch(error){ console.error(error)}
          if(i == 0){
            const hl = document.createElement('h4');
            var s = '“Somewhere, something incredible is waiting to be known.”- Carl Sagan';
            hl.innerHTML = s.italics();
            element.appendChild(hl);
          }
          element.appendChild(n);
          element.appendChild(d);

        }

        const hl = document.createElement('h3');
        hl.textContent = "Connect"
        hl.style.fontSize = '40px';
        hl.style.textAlign = 'center';
        const g = document.createElement('button');
        g.setAttribute('class', 'active');
        g.setAttribute('onclick', "window.open('https://www.github.com/RonaldKroening', '_blank')");
        const im = document.createElement('img');
        im.setAttribute('width', '60');
        im.setAttribute('height', '60');
        im.setAttribute('src', 'ghub_logo.png');
        g.appendChild(im);
        element.appendChild(g);
        const g1 = document.createElement('button');
        g1.setAttribute('class', 'active');
        g1.setAttribute('onclick', "window.open('https://www.linkedin.com/in/RonaldKroening', '_blank')");
        const im1 = document.createElement('img');
        im1.setAttribute('width', '60');
        im1.setAttribute('height', '60');
        im1.setAttribute('src', 'ldin.png');
        g1.appendChild(im1);
        element.appendChild(hl);
        element.appendChild(g);
        
        element.appendChild(g1);
        

      })
      .catch(error => console.error(error));
</script>

  
  <script>
    function scrollToSection2() {
      const section = document.querySelector('#section02');
      section.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
