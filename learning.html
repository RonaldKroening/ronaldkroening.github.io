<script>
    // Fetch the presentation.json file
    fetch('presentations.json')
  .then(response => response.json())
  .then(data => {
    const presentationList = document.getElementById('presentationTable');

    data.forEach(item => {
      const t = item.name;
      const d = item.description;
      const l = item.link;
      
      let listItem = document.createElement("div"); // Changed div to li element
      listItem.setAttribute("class","pres-obj")
      let title = document.createElement("h3");
      title.textContent = t;
      let desc = document.createElement("p");
      desc.textContent = d;

      listItem.appendChild(title);
      listItem.appendChild(desc);

      listItem.onclick = function () {
        window.open(l, '_blank'); 
      };

      presentationList.appendChild(listItem);
    });
  })
  .catch(error => console.log('Error:', error));

</script>
