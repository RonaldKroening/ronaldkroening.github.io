<script>
    // Fetch the presentation.json file
    fetch('presentations.json')
        .then(response => response.json())
        .then(data => {
            // Generate the table rows and cells dynamically
            const table = document.getElementById('presentationTable');

            data.forEach(item => {
                const row = table.insertRow();
                const cell = row.insertCell();

                // Create the block element
                const block = document.createElement('div');
                block.classList.add('block');

                // Create the h2 element for title
                const title = document.createElement('h2');
                title.innerText = item.title;

                // Create the preview element
                const preview = document.createElement('div');
                preview.classList.add('preview');

                // Create the p element for description
                const description = document.createElement('p');
                description.innerText = item.description;

                // Append the elements to the block
                block.appendChild(title);
                block.appendChild(preview);
                block.appendChild(description);

                // Append the block to the cell
                cell.appendChild(block);
            });
        })
        .catch(error => console.log('Error:', error));
</script>
